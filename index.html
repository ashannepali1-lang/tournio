<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTourney | Player Hub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #818cf8;
            --accent: #c084fc;
            --text-white: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(192, 132, 252, 0.15) 0%, transparent 50%);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Components --- */
        .hidden { display: none !important; }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
        }

        .btn-outline {
            border-color: var(--primary);
            background: transparent;
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
            transform: translateY(-2px);
        }

        .btn-solid {
            background: var(--gradient);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-solid:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* --- Auth View --- */
        #auth-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 { font-size: 2rem; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .toggle-auth {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
        }
        .toggle-auth span { color: var(--primary); font-weight: 600; }

        /* --- Main App View --- */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px 0;
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        /* Lists */
        .tournament-item {
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease forwards;
        }

        .tournament-item h3 { color: var(--accent); margin-bottom: 8px; }
        .tournament-item p { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 4px; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(129, 140, 248, 0.2);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--primary);
            margin-top: 10px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            gap: 5px;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; }

        /* Toast */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: var(--gradient);
            color: white;
            z-index: 2000;
            transform: translateX(200%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { transform: translateX(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="toast">Message here</div>

    <!-- 1. AUTHENTICATION VIEW -->
    <section id="auth-view">
        <!-- Login Card -->
        <div class="card auth-card" id="login-form-container">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn btn-solid" style="width: 100%;">Sign In</button>
            </form>
            <div class="toggle-auth" onclick="toggleAuth()">New player? <span>Create Account</span></div>
        </div>

        <!-- Signup Card -->
        <div class="card auth-card hidden" id="signup-form-container">
            <h2>Join the Arena</h2>
            <form id="signup-form">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required>
                <button type="submit" class="btn btn-solid" style="width: 100%;">Register</button>
            </form>
            <div class="toggle-auth" onclick="toggleAuth()">Already a member? <span>Login</span></div>
        </div>
    </section>

    <!-- 2. APP VIEW -->
    <section id="app-view" class="hidden">
        <div class="app-container">
            <div class="header">
                <div class="logo">ProTourney</div>
                <button class="btn btn-outline" id="logout-btn" style="padding: 8px 15px; font-size: 0.8rem;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

            <!-- Home Screen -->
            <div id="view-home" class="view">
                <div class="card" style="margin-bottom: 25px; text-align: center;">
                    <h1 id="user-greeting">Hi, Player!</h1>
                    <p style="color: var(--text-dim)">Ready for your next challenge?</p>
                </div>
                
                <div class="menu-grid">
                    <button class="btn btn-outline" onclick="showSection('view-browse')">
                        <i class="fas fa-search"></i> View Tournaments
                    </button>
                    <button class="btn btn-outline" onclick="showSection('view-my')">
                        <i class="fas fa-trophy"></i> My Tournaments
                    </button>
                </div>
            </div>

            <!-- Browse Tournaments -->
            <div id="view-browse" class="view hidden">
                <h2 style="margin-bottom: 20px;">Available Events</h2>
                <div id="tournament-list">
                    <!-- Loaded from Firestore -->
                    <p style="color: var(--text-dim)">Loading tournaments...</p>
                </div>
            </div>

            <!-- My Tournaments -->
            <div id="view-my" class="view hidden">
                <h2 style="margin-bottom: 20px;">Joined Events</h2>
                <div id="my-tournament-list">
                    <!-- Filtered from Firestore -->
                    <p style="color: var(--text-dim)">No tournaments joined yet.</p>
                </div>
            </div>

            <!-- Join Form (Dynamic Modal/Overlay) -->
            <div id="view-join" class="view hidden">
                <button class="btn btn-outline" onclick="showSection('view-browse')" style="margin-bottom: 20px;">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <div class="card">
                    <h3 id="join-title">Join Tournament</h3>
                    <p id="join-meta" style="color:var(--text-dim); margin-bottom: 20px;"></p>
                    <form id="join-tournament-form">
                        <input type="hidden" id="join-t-id">
                        <input type="text" id="join-team" placeholder="Team Name (Optional)">
                        <input type="tel" id="join-phone" placeholder="Phone Number" required>
                        <button type="submit" class="btn btn-solid" style="width: 100%;">Confirm Registration</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showSection('view-home')">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" onclick="showSection('view-browse')">
                <i class="fas fa-gamepad"></i>
                <span>Explore</span>
            </div>
            <div class="nav-item" onclick="showSection('view-my')">
                <i class="fas fa-heart"></i>
                <span>Joined</span>
            </div>
        </nav>
    </section>

    <!-- Firebase Scripts -->
    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut,
            updateProfile 
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            getDocs, 
            onSnapshot,
            doc, 
            query, 
            where, 
            setDoc,
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyB7TT47bJkZE1XFKkTfg4qy3x6KiNLNhRw",
            authDomain: "tournament-1911b.firebaseapp.com",
            databaseURL: "https://tournament-1911b-default-rtdb.firebaseio.com",
            projectId: "tournament-1911b",
            storageBucket: "tournament-1911b.firebasestorage.app",
            messagingSenderId: "739243512368",
            appId: "1:739243512368:web:f1310b12578f8dbc5ed3f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Global Helpers ---
        const notify = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        window.toggleAuth = () => {
            document.getElementById('login-form-container').classList.toggle('hidden');
            document.getElementById('signup-form-container').classList.toggle('hidden');
        };

        window.showSection = (sectionId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById(sectionId);
            if(target) target.classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(sectionId.includes(item.querySelector('span').innerText.toLowerCase())) {
                    item.classList.add('active');
                }
            });

            if(sectionId === 'view-browse') fetchTournaments();
            if(sectionId === 'view-my') fetchMyTournaments();
        };

        // --- Authentication Logic ---
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: name });
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    name, email, joinedAt: serverTimestamp()
                });
                notify("Account created successfully!");
            } catch (err) {
                notify(err.message);
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                notify("Welcome back!");
            } catch (err) {
                notify("Invalid email or password");
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => notify("Logged out"));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('user-greeting').innerText = `Hi, ${user.displayName || 'Player'}!`;
                window.showSection('view-home');
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        });

        // --- Firestore Logic ---

        // 1. Fetch All Tournaments (Real-time)
        function fetchTournaments() {
            const list = document.getElementById('tournament-list');
            onSnapshot(collection(db, "tournaments"), (snap) => {
                list.innerHTML = "";
                if(snap.empty) {
                    list.innerHTML = "<p>No active tournaments found.</p>";
                    return;
                }
                snap.forEach(tDoc => {
                    const data = tDoc.data();
                    const item = document.createElement('div');
                    item.className = 'card tournament-item';
                    item.innerHTML = `
                        <h3>${data.name}</h3>
                        <p><i class="fas fa-calendar-day"></i> ${data.date}</p>
                        <p><i class="fas fa-map-marker-alt"></i> ${data.location}</p>
                        <p><i class="fas fa-info-circle"></i> Type: ${data.type}</p>
                        <p style="margin-top:10px; font-style: italic;">Rules: ${data.rules}</p>
                        <button class="btn btn-solid" style="width: 100%; margin-top:15px;" 
                                onclick="window.openJoinForm('${tDoc.id}', '${data.name}', '${data.date}')">
                            Join Tournament
                        </button>
                    `;
                    list.appendChild(item);
                });
            });
        }

        // 2. Join Form Handler
        window.openJoinForm = (id, name, date) => {
            document.getElementById('join-t-id').value = id;
            document.getElementById('join-title').innerText = `Joining ${name}`;
            document.getElementById('join-meta').innerText = `Event Date: ${date}`;
            window.showSection('view-join');
        };

        document.getElementById('join-tournament-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tId = document.getElementById('join-t-id').value;
            const team = document.getElementById('join-team').value;
            const phone = document.getElementById('join-phone').value;

            try {
                const participantData = {
                    uid: auth.currentUser.uid,
                    name: auth.currentUser.displayName,
                    email: auth.currentUser.email,
                    teamName: team,
                    phone: phone,
                    joinedAt: serverTimestamp()
                };

                await addDoc(collection(db, `tournaments/${tId}/participants`), participantData);
                await addDoc(collection(db, "registrations"), {
                    ...participantData,
                    tournamentId: tId,
                    tournamentName: document.getElementById('join-title').innerText.replace('Joining ', '')
                });

                notify("Successfully registered!");
                window.showSection('view-my');
            } catch (err) {
                notify("Registration failed: " + err.message);
            }
        });

        // 3. Fetch My Tournaments
        async function fetchMyTournaments() {
            const list = document.getElementById('my-tournament-list');
            list.innerHTML = "Fetching your history...";
            try {
                const q = query(collection(db, "registrations"), where("uid", "==", auth.currentUser.uid));
                const snap = await getDocs(q);
                list.innerHTML = "";
                
                if(snap.empty) {
                    list.innerHTML = `<div style="text-align:center; padding: 20px;">
                        <p style="color:var(--text-dim)">You haven't joined any tournaments yet.</p>
                        <button class="btn btn-outline" style="margin-top:15px;" onclick="window.showSection('view-browse')">Explore Now</button>
                    </div>`;
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'card tournament-item';
                    item.innerHTML = `
                        <div style="display:flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3>${data.tournamentName}</h3>
                                <p>Team: ${data.teamName || 'Solo'}</p>
                            </div>
                            <span class="badge">Confirmed</span>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch (err) {
                notify("Error fetching history");
            }
        }
    </script>
</body>
</html>
