<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Admin Panel</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- Auth Section --- */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 25px; text-align: center; font-weight: 600; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-block;
            border: 2px solid transparent;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }

        .btn-danger { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .switch-auth { text-align: center; margin-top: 20px; color: var(--text-dim); cursor: pointer; }
        .switch-auth b { color: var(--primary); }

        /* --- Dashboard Layout --- */
        .dashboard-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .stat-card h3 { font-size: 2.5rem; }
        .stat-card p { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Tournament Management */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .card-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tournament-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        .tournament-item h4 { font-size: 1.2rem; margin-bottom: 5px; }
        .tournament-item p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; }

        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .actions .btn { padding: 8px 15px; font-size: 0.85rem; }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .participant-list-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Toast Notifications */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            z-index: 2000;
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }

        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- AUTH SECTION -->
    <section id="auth-section" class="auth-container">
        <div class="auth-card" id="login-card">
            <h2>Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login to Console</button>
            </form>
            <div class="switch-auth" onclick="toggleAuthForms()">Don't have an account? <b>Signup</b></div>
        </div>

        <div class="auth-card hidden" id="signup-card">
            <h2>Admin Registration</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <div class="switch-auth" onclick="toggleAuthForms()">Already registered? <b>Login</b></div>
        </div>
    </section>

    <!-- DASHBOARD SECTION -->
    <section id="dashboard-section" class="dashboard-wrapper hidden">
        <header>
            <h1><i class="fas fa-shield-halved"></i> Admin Panel</h1>
            <button class="btn btn-danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-trophy"></i>
                <h3 id="stat-tournaments">0</h3>
                <p>Tournaments</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 id="stat-participants">0</h3>
                <p>Total Participants</p>
            </div>
        </div>

        <div class="main-content">
            <!-- Create Form -->
            <div class="card-panel">
                <h3><i class="fas fa-plus-circle"></i> Create Tournament</h3>
                <br>
                <form id="tournament-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label>Tournament Name</label>
                        <input type="text" id="t-name" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="t-type">
                            <option value="Knockout">Knockout</option>
                            <option value="League">League</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="t-date" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="t-location" required>
                    </div>
                    <div class="form-group">
                        <label>Rules</label>
                        <textarea id="t-rules" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submit-t-btn">Create Tournament</button>
                    <button type="button" class="btn btn-outline hidden" id="cancel-edit-btn" onclick="resetTForm()" style="margin-top: 10px; width: 100%;">Cancel Edit</button>
                </form>
            </div>

            <!-- List Section -->
            <div class="card-panel">
                <h3><i class="fas fa-list"></i> Manage Tournaments</h3>
                <br>
                <div id="tournament-list">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </section>

    <!-- MODAL FOR VIEW PARTICIPANTS -->
    <div id="participants-modal" class="modal hidden">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
                <h3>Participants List</h3>
                <button class="btn btn-danger" onclick="closeModal()">&times;</button>
            </div>
            <div id="participants-container">
                <!-- Participants loaded here -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK Modular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            doc, 
            deleteDoc, 
            updateDoc,
            query,
            getDocs 
        } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        // REPLACE THESE WITH YOUR OWN CONFIG
        const firebaseConfig = {
     apiKey: "AIzaSyB7TT47bJkZE1XFKkTfg4qy3x6KiNLNhRw",
    authDomain: "tournament-1911b.firebaseapp.com",
        databaseURL: "https://tournament-1911b-default-rtdb.firebaseio.com",
    projectId: "tournament-1911b",
    storageBucket: "tournament-1911b.firebasestorage.app",
     messagingSenderId: "739243512368",
    appId: "1:739243512368:web:f1310b12578f8dbc5ed3f5"
    };


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Helpers ---
        const showToast = (msg, color = 'var(--success)') => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        window.toggleAuthForms = () => {
            document.getElementById('login-card').classList.toggle('hidden');
            document.getElementById('signup-card').classList.toggle('hidden');
        };

        // --- Authentication ---
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => showToast("Admin registered successfully!"))
                .catch(err => showToast(err.message, 'var(--danger)'));
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => showToast("Welcome back!"))
                .catch(err => showToast(err.message, 'var(--danger)'));
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => showToast("Logged out"));
        });

        // Auth State Monitor
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                loadTournaments();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        // --- Tournament CRUD ---
        const tForm = document.getElementById('tournament-form');
        tForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('t-name').value,
                type: document.getElementById('t-type').value,
                date: document.getElementById('t-date').value,
                location: document.getElementById('t-location').value,
                rules: document.getElementById('t-rules').value,
                createdBy: auth.currentUser.uid
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "tournaments", id), data);
                    showToast("Tournament updated!");
                } else {
                    await addDoc(collection(db, "tournaments"), data);
                    showToast("Tournament created!");
                }
                resetTForm();
            } catch (err) {
                showToast(err.message, 'var(--danger)');
            }
        });

        window.resetTForm = () => {
            tForm.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('submit-t-btn').innerText = "Create Tournament";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        // Real-time listener for Tournament List
        let allTournaments = [];
        const loadTournaments = () => {
            onSnapshot(collection(db, "tournaments"), async (snapshot) => {
                const list = document.getElementById('tournament-list');
                list.innerHTML = "";
                let totalP = 0;
                
                document.getElementById('stat-tournaments').innerText = snapshot.size;

                snapshot.forEach(async (tDoc) => {
                    const t = tDoc.data();
                    const tId = tDoc.id;
                    
                    // Create element
                    const div = document.createElement('div');
                    div.className = 'tournament-item';
                    div.innerHTML = `
                        <h4>${t.name}</h4>
                        <p><i class="far fa-calendar"></i> ${t.date} | <i class="fas fa-map-marker-alt"></i> ${t.location}</p>
                        <div class="actions">
                            <button class="btn btn-outline" onclick="editTournament('${tId}', '${t.name}', '${t.type}', '${t.date}', '${t.location}', \`${t.rules}\`)"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn btn-outline" onclick="viewParticipants('${tId}')"><i class="fas fa-users"></i> Participants</button>
                            <button class="btn btn-danger" onclick="deleteTournament('${tId}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    list.appendChild(div);

                    // Count participants for stats
                    const pSnap = await getDocs(collection(db, `tournaments/${tId}/participants`));
                    totalP += pSnap.size;
                    document.getElementById('stat-participants').innerText = totalP;
                });
            });
        };

        window.deleteTournament = async (id) => {
            if (confirm("Delete this tournament?")) {
                await deleteDoc(doc(db, "tournaments", id));
                showToast("Tournament deleted", "var(--danger)");
            }
        };

        window.editTournament = (id, name, type, date, location, rules) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('t-name').value = name;
            document.getElementById('t-type').value = type;
            document.getElementById('t-date').value = date;
            document.getElementById('t-location').value = location;
            document.getElementById('t-rules').value = rules;
            
            document.getElementById('submit-t-btn').innerText = "Update Tournament";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // --- Participants ---
        window.viewParticipants = async (tId) => {
            const container = document.getElementById('participants-container');
            container.innerHTML = "Loading...";
            document.getElementById('participants-modal').classList.remove('hidden');

            const q = collection(db, `tournaments/${tId}/participants`);
            const snap = await getDocs(q);
            
            container.innerHTML = "";
            if (snap.empty) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-dim)'>No participants joined yet.</p>";
            } else {
                snap.forEach(pDoc => {
                    const p = pDoc.data();
                    const pDiv = document.createElement('div');
                    pDiv.className = 'participant-list-item';
                    pDiv.innerHTML = `
                        <div>
                            <b>${p.name}</b><br>
                            <small style="color:var(--text-dim)">Team: ${p.teamName || 'N/A'}</small>
                        </div>
                        <div style="color:var(--primary)">
                            <i class="fas fa-phone"></i> ${p.phone || 'N/A'}
                        </div>
                    `;
                    container.appendChild(pDiv);
                });
            }
        };

        window.closeModal = () => {
            document.getElementById('participants-modal').classList.add('hidden');
        };

    </script>
</body>
</html>
